stages:
  - test

default:
  tags: [k8s]

validate-plugins:
  stage: test
  image: alpine:latest
  before_script:
    - apk add --no-cache bash jq findutils
  script:
    - bash tests/validate-plugins.sh
  rules:
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - plugins/**/*
        - .claude-plugin/marketplace.json
        - tests/validate-plugins.sh

check-version-bumped:
  stage: test
  image: alpine:latest
  before_script:
    - apk add --no-cache bash jq git
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME":"refs/remotes/origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
  script:
    - bash tests/check-version-bumped.sh
  rules:
    - if: $CI_MERGE_REQUEST_IID
      changes:
        - plugins/**/*
        - .claude-plugin/marketplace.json
        - tests/check-version-bumped.sh
